<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyToTech - Login</title>
    <link rel="stylesheet" href="/StudyToTech/StudyToTech/fornt-end/html/css/style_login.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <h2>StudyToTech</h2>
            <p>Planejamento Acadêmico Inteligente</p>
            <form id="login-form">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-main">Entrar</button>
            </form>
            <p class="footer-text">Não tem conta? <a href="#">Cadastre-se</a></p>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();

            window.location.href = "index.html"; 
        });
    </script>

    <div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
</script>

</body>
</html>
